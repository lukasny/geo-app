# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "37b74e8919e819fbda10974661a0983b"
name = "GEO Rise"
application_url = "https://geo-app-hkhi.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://geo-app-hkhi.onrender.com/proxy/llms-txt"
subpath = "llms-txt"
prefix = "a"

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  [[webhooks.subscriptions]]
  topics = [ "products/create", "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  # orders/paid subscription is intentionally OMITTED here. Shopify requires
  # apps to be approved for "Protected Customer Data" access before they
  # can subscribe to any order/customer webhook. Apply at:
  #   Partner Dashboard > Apps > GEO Rise > Configuration > Protected customer data access
  # After approval, restore the block:
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/paid" ]
  #   uri = "/webhooks/orders/paid"
  # Until then, the handler at app/routes/webhooks.orders.paid.tsx exists
  # but is never invoked, and the revenue-attribution feature shows empty
  # state (cart attributes are still written by the theme extension; we
  # just can't read them into AiTrafficEvent rows yet).

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_markets + read_translations power multi-market llms.txt. Adding scopes
# requires `shopify app deploy` and a merchant re-auth before they take effect.
scopes = "write_products,read_content,write_content,read_themes,read_orders,read_reports,read_markets,read_translations"

[auth]
redirect_urls = [
  "https://geo-app-hkhi.onrender.com/auth/callback",
  "https://geo-app-hkhi.onrender.com/auth/shopify/callback",
  "https://geo-app-hkhi.onrender.com/api/auth/callback",
]
